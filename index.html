<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Kingdom - Live Streaming Dashboard</title>
  
  <!-- HLS.js for live streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  
  <style>
    :root {
      --bg-dark: #090b0e;
      --bg-sidebar: #0e1218;
      --bg-card: #131822;
      --bg-card-hover: #1a212e;
      --accent-orange: #ff5500;
      --accent-gradient: linear-gradient(135deg, #ff7700 0%, #ff3300 100%);
      --text-main: #ffffff;
      --text-sub: #8a96a8;
      --border-color: rgba(255, 255, 255, 0.07);
      --red-live: #e50914;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background-color: var(--bg-dark); 
      color: var(--text-main); 
      height: 100vh; 
      overflow: hidden; 
    }

    /* ================= 0. STANDALONE FIRST LOGIN PAGE ================= */
    #login-page {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #182030 0%, #090b0e 100%);
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      padding: 40px 32px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 85, 0, 0.15);
      width: 100%;
      max-width: 360px;
      text-align: center;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .login-logo {
      font-size: 2.2rem;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-size: 0.85rem;
      color: var(--text-sub);
      margin-bottom: 28px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-input {
      width: 100%;
      background: #090b0e;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 14px;
      color: #fff;
      font-size: 1.3rem;
      letter-spacing: 8px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-input:focus {
      border-color: var(--accent-orange);
      box-shadow: 0 0 16px rgba(255, 85, 0, 0.35);
    }

    .login-submit-btn {
      width: 100%;
      background: var(--accent-gradient);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 85, 0, 0.3);
      transition: transform 0.2s, opacity 0.2s;
    }

    .login-submit-btn:hover {
      opacity: 0.92;
      transform: translateY(-2px);
    }

    .login-error-msg {
      color: #ff3344;
      font-size: 0.8rem;
      margin-top: 14px;
      display: none;
      font-weight: 600;
    }

    /* ================= MAIN DASHBOARD APP ================= */
    #app-dashboard {
      display: none;
      height: 100vh;
      width: 100vw;
    }

    /* ================= 1. LEFT SIDEBAR ================= */
    #left-sidebar {
      width: 250px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      gap: 14px;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.25rem;
      font-weight: 800;
      color: #ff6600;
      padding: 0 6px;
    }

    .sidebar-search { position: relative; }
    .sidebar-search input {
      width: 100%;
      background: #141a24;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 36px 10px 12px;
      color: #fff;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .sidebar-search input:focus { 
      border-color: var(--accent-orange); 
      box-shadow: 0 0 8px rgba(255, 85, 0, 0.4);
    }
    .sidebar-search .search-icon {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      font-size: 0.85rem; color: var(--text-sub);
    }

    .nav-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--text-sub);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 6px;
      padding-left: 6px;
    }

    .nav-group { display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.04); }
    .nav-item.active {
      background: var(--accent-gradient);
      color: #fff;
      font-weight: 600;
      box-shadow: 0 4px 14px rgba(255, 85, 0, 0.3);
    }

    .nav-divider { height: 1px; background: var(--border-color); margin: 4px 0; }

    .mini-player-card {
      margin-top: auto;
      background: #121720;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px;
      position: relative;
    }
    .mini-card-info { margin-top: 6px; }
    .mini-card-title { font-size: 0.8rem; font-weight: 700; }
    .mini-card-sub { font-size: 0.7rem; color: var(--text-sub); }
    .mini-live-tag {
      position: absolute; top: 14px; left: 14px;
      background: var(--red-live); font-size: 0.6rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
    }

    /* ================= 2. MAIN CONTENT AREA ================= */
    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      padding: 16px 24px;
      gap: 14px;
    }

    .top-header { 
      display: flex; 
      justify-content: flex-end; 
      align-items: center; 
      flex-shrink: 0;
    }

    .user-profile { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      background: #131822; border: 1px solid var(--border-color); color: #fff;
      width: 36px; height: 36px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .icon-btn:hover {
      border-color: var(--accent-orange);
      background: #1a212e;
    }
    .profile-info { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%; background: #2a3447;
      display: flex; align-items: center; justify-content: center; font-weight: bold;
    }

    .player-container {
      width: 100%; 
      height: 380px; 
      background: #000; 
      border-radius: 16px;
      position: relative; 
      overflow: hidden; 
      border: 1px solid var(--border-color);
      flex-shrink: 0; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      cursor: pointer;
    }

    .player-container:fullscreen {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
    }

    video { width: 100%; height: 100%; object-fit: cover; }

    .player-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.85) 100%);
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 18px 22px; 
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .player-container.user-idle .player-overlay {
      opacity: 0;
      pointer-events: none;
    }
    .player-container.user-idle {
      cursor: none;
    }

    .player-top-info { display: flex; justify-content: space-between; align-items: center; pointer-events: auto; }
    .playing-meta { display: flex; align-items: center; gap: 12px; }
    .live-badge { background: var(--red-live); padding: 4px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 800; }
    .playing-title { font-size: 1.1rem; font-weight: 700; }
    .playing-sub { font-size: 0.8rem; color: var(--text-sub); }

    .top-controls { display: flex; gap: 10px; align-items: center; }
    .quality-select {
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      border: 1px solid var(--border-color); color: #fff; padding: 6px 12px;
      border-radius: 8px; font-size: 0.85rem; outline: none; cursor: pointer;
    }

    .top-controls .icon-btn { width: 40px; height: 40px; font-size: 1.15rem; }

    .player-bottom-controls { display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .left-ctrls, .right-ctrls { display: flex; align-items: center; gap: 18px; }
    
    .ctrl-icon { 
      cursor: pointer; 
      font-size: 1.45rem; 
      opacity: 0.9; 
      transition: transform 0.2s, opacity 0.2s;
      user-select: none;
    }
    .ctrl-icon:hover { opacity: 1; transform: scale(1.15); }
    .time-indicator { font-size: 0.82rem; color: #ccc; font-weight: 600; }

    .channels-section-wrapper { 
      flex: 1; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      min-height: 0;
    }
    .section-title { font-size: 1.05rem; font-weight: 700; flex-shrink: 0; }
    
    .all-channels-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 14px;
      padding-bottom: 20px;
      padding-right: 4px;
      overflow-y: auto;
    }

    .all-channels-grid::-webkit-scrollbar { width: 6px; }
    .all-channels-grid::-webkit-scrollbar-track { background: transparent; }
    .all-channels-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .channel-card-box {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      transition: all 0.2s;
    }
    .channel-card-box:hover {
      background: var(--bg-card-hover);
      border-color: var(--accent-orange);
      transform: translateY(-2px);
    }
    .card-fav-btn { 
      position: absolute; top: 8px; right: 8px; 
      font-size: 0.85rem; color: var(--text-sub);
      transition: transform 0.2s;
    }
    .card-fav-btn:hover { transform: scale(1.2); }
    .card-fav-btn.is-fav { color: #ff3344; }

    .card-logo { width: 44px; height: 44px; object-fit: contain; margin-bottom: 8px; }
    .card-name { font-size: 0.82rem; font-weight: 700; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .card-cat { font-size: 0.68rem; color: var(--text-sub); margin-bottom: 8px; }
    .card-tags { display: flex; gap: 4px; }
    .tag-badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; background: rgba(255,255,255,0.06); color: var(--text-sub); }
    .tag-badge.live { background: var(--red-live); color: #fff; font-weight: 700; }
  </style>
</head>
<body>

  <!-- 0. FIRST LOGIN INTERFACE -->
  <div id="login-page">
    <div class="login-container">
      <div class="login-logo">👑 TV KINGDOM</div>
      <div class="login-subtitle">Enter Passcode to Unlock Portal</div>
      
      <div class="input-group">
        <input type="password" id="passcode-input" class="login-input" placeholder="••••" maxlength="4" autofocus />
        <button class="login-submit-btn" onclick="authenticateUser()">Enter Website</button>
      </div>

      <div class="login-error-msg" id="login-error">Incorrect passcode! Please try again.</div>
    </div>
  </div>

  <!-- 1. WEBSITE DASHBOARD -->
  <div id="app-dashboard">
    
    <!-- LEFT SIDEBAR -->
    <div id="left-sidebar">
      <div class="brand-title">👑 TV KINGDOM</div>
      
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="Search channels..." oninput="filterChannels()" />
        <span class="search-icon">🔍</span>
      </div>

      <div class="nav-label">Navigation</div>
      <div class="nav-group">
        <div class="nav-item active" onclick="selectCategory('All', this)"><span>🏠</span> Home</div>
        <div class="nav-item" onclick="selectCategory('Favorites', this)"><span>❤️</span> Favorites</div>
        <div class="nav-item" onclick="selectCategory('History', this)"><span>🕒</span> History</div>
      </div>

      <div class="nav-divider"></div>

      <div class="nav-label">Categories</div>
      <div class="nav-group" id="sidebar-categories"></div>

      <div class="mini-player-card">
        <span class="mini-live-tag">LIVE</span>
        <div class="mini-card-info">
          <div class="mini-card-title" id="mini-title">Select Channel</div>
          <div class="mini-card-sub" id="mini-sub">Live Stream</div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content">
      
      <div class="top-header">
        <div class="user-profile">
          <div class="icon-btn" onclick="focusSearch()" title="Search Channels">🔍</div>
          <div class="icon-btn" onclick="lockWebsite(true)" title="Lock Portal">🔒</div>
          <div class="profile-info">
            <div class="avatar">H</div>
            <div style="font-size:0.78rem;">
              <div style="color:var(--text-sub);">Welcome</div>
              <div style="font-weight:700;">Harinder ▾</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Video Player -->
      <div class="player-container" id="player-wrapper" onclick="togglePlay()">
        <video id="video-player" autoplay></video>

        <div class="player-overlay">
          <div class="player-top-info" onclick="event.stopPropagation()">
            <div class="playing-meta">
              <span class="live-badge">LIVE</span>
              <div>
                <div class="playing-title" id="player-title">Select Stream</div>
                <div class="playing-sub" id="player-sub">General</div>
              </div>
            </div>
            <div class="top-controls">
              <select class="quality-select" id="quality-select" onchange="changeQuality(this.value)">
                <option value="-1">Auto ▾</option>
              </select>
              <div class="icon-btn">📺</div>
              <div class="icon-btn">⚙️</div>
            </div>
          </div>

          <div class="player-bottom-controls" onclick="event.stopPropagation()">
            <div class="controls-row">
              <div class="left-ctrls">
                <span class="ctrl-icon" id="play-btn" onclick="togglePlay();">⏸</span>
                <span class="ctrl-icon">↺10</span>
                <span class="time-indicator">LIVE STREAM</span>
              </div>
              <div class="right-ctrls">
                <span class="ctrl-icon" onclick="toggleMute();" id="mute-btn">🔊</span>
                <span class="ctrl-icon">📺</span>
                <span class="ctrl-icon" onclick="toggleFullscreen();">⛶</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Channels Grid -->
      <div class="channels-section-wrapper">
        <div class="section-title" id="channels-section-header">All Channels</div>
        <div class="all-channels-grid" id="channel-list"></div>
      </div>

    </div>
  </div>

  <script>
    const VALID_PASSCODE = "2002";
    const TWO_HOURS_MS = 2 * 60 * 60 * 1000; // 2 hours
    let isPlaylistLoaded = false;

    function authenticateUser() {
      const inputCode = document.getElementById("passcode-input").value;
      const errorLabel = document.getElementById("login-error");

      if (inputCode === VALID_PASSCODE) {
        unlockWebsite();
      } else {
        errorLabel.style.display = "block";
        document.getElementById("passcode-input").value = "";
      }
    }

    function unlockWebsite() {
      document.getElementById("login-page").style.display = "none";
      document.getElementById("app-dashboard").style.display = "flex";
      
      localStorage.setItem("tv_kingdom_authenticated", "true");
      localStorage.setItem("tv_kingdom_login_time", Date.now().toString());

      if (!isPlaylistLoaded) {
        loadPlaylist();
        isPlaylistLoaded = true;
      }
    }

    function lockWebsite(shouldReload = false) {
      localStorage.removeItem("tv_kingdom_authenticated");
      localStorage.removeItem("tv_kingdom_login_time");
      
      document.getElementById("app-dashboard").style.display = "none";
      document.getElementById("login-page").style.display = "flex";
      document.getElementById("login-error").style.display = "none";
      document.getElementById("passcode-input").value = "";
      
      if (shouldReload) {
        location.reload();
      }
    }

    // Enter key support
    document.getElementById("passcode-input").addEventListener("keypress", (e) => {
      if (e.key === "Enter") authenticateUser();
    });

    // Check auth on load without infinite refresh loop
    function checkAuthenticationSession() {
      const isAuthenticated = localStorage.getItem("tv_kingdom_authenticated") === "true";
      const loginTime = parseInt(localStorage.getItem("tv_kingdom_login_time") || "0", 10);
      const now = Date.now();

      if (isAuthenticated && loginTime && (now - loginTime < TWO_HOURS_MS)) {
        unlockWebsite();
      } else {
        lockWebsite(false); // Do not trigger location.reload() here
      }
    }

    checkAuthenticationSession();

    const PLAYLIST_URL = 'https://iptv-org.github.io/iptv/countries/in.m3u';

    let channels = [];
    let favorites = JSON.parse(localStorage.getItem('tv_favorites') || '[]');
    let historyList = JSON.parse(localStorage.getItem('tv_history') || '[]');
    let selectedCategory = 'All';
    
    const video = document.getElementById('video-player');
    const playBtn = document.getElementById('play-btn');
    const muteBtn = document.getElementById('mute-btn');
    const qualitySelect = document.getElementById('quality-select');
    const playerWrapper = document.getElementById('player-wrapper');
    
    let hls = null;
    let idleTimer = null;

    async function loadPlaylist() {
      try {
        const response = await fetch(PLAYLIST_URL);
        const text = await response.text();
        channels = parseM3U(text);
        
        renderCategories();
        filterChannels();
        if (channels.length > 0) playStream(channels[0]);
      } catch (err) {
        document.getElementById('channel-list').innerHTML = '<div style="color:#ef4444; padding:10px;">Failed to load channels.</div>';
      }
    }

    function parseM3U(m3uText) {
      const lines = m3uText.split('\n');
      const result = [];
      let current = {};

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
          const nameMatch = line.match(/,(.+)$/);
          const logoMatch = line.match(/tvg-logo="([^"]+)"/);
          const groupMatch = line.match(/group-title="([^"]+)"/);

          current = {
            name: nameMatch ? nameMatch[1].trim() : 'Unknown Channel',
            logo: logoMatch ? logoMatch[1] : '',
            group: groupMatch ? groupMatch[1].trim() : 'General'
          };
        } else if (line && !line.startsWith('#')) {
          current.url = line;
          result.push(current);
          current = {};
        }
      }
      return result;
    }

    function renderCategories() {
      const extractedCats = ['All', ...new Set(channels.map(c => c.group).filter(Boolean))].sort();
      const sidebarContainer = document.getElementById('sidebar-categories');
      sidebarContainer.innerHTML = '';
      
      extractedCats.forEach(cat => {
        if (cat === 'All') return;
        const navItem = document.createElement('div');
        navItem.className = `nav-item ${cat === selectedCategory ? 'active' : ''}`;
        navItem.innerHTML = `<span>📺</span> ${cat}`;
        navItem.onclick = () => selectCategory(cat, navItem);
        sidebarContainer.appendChild(navItem);
      });
    }

    function selectCategory(cat, element) {
      selectedCategory = cat;
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      if (element) element.classList.add('active');
      filterChannels();
    }

    function filterChannels() {
      const query = document.getElementById('search-input').value.toLowerCase();
      let filtered = [];

      if (selectedCategory === 'Favorites') {
        filtered = channels.filter(c => favorites.includes(c.url));
      } else if (selectedCategory === 'History') {
        filtered = historyList.map(url => channels.find(c => c.url === url)).filter(Boolean);
      } else if (selectedCategory === 'All') {
        filtered = channels;
      } else {
        filtered = channels.filter(c => c.group === selectedCategory);
      }

      if (query) {
        filtered = filtered.filter(c => c.name.toLowerCase().includes(query));
      }

      document.getElementById('channels-section-header').innerText = `${selectedCategory} Channels (${filtered.length})`;
      renderChannels(filtered);
    }

    function renderChannels(list) {
      const container = document.getElementById('channel-list');
      container.innerHTML = '';

      if (list.length === 0) {
        container.innerHTML = '<div style="color:var(--text-sub); padding:10px;">No channels found</div>';
        return;
      }

      list.forEach(ch => {
        const isFav = favorites.includes(ch.url);
        const card = document.createElement('div');
        card.className = 'channel-card-box';
        card.onclick = () => playStream(ch);

        const logoSrc = ch.logo || 'https://via.placeholder.com/48?text=TV';
        card.innerHTML = `
          <span class="card-fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite(event, '${encodeURIComponent(ch.url)}')">
            ${isFav ? '❤️' : '🤍'}
          </span>
          <img class="card-logo" src="${logoSrc}" onerror="this.src='https://via.placeholder.com/48?text=TV'" alt="" />
          <div class="card-name">${ch.name}</div>
          <div class="card-cat">${ch.group}</div>
          <div class="card-tags">
            <span class="tag-badge">1080p</span>
            <span class="tag-badge live">LIVE</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function toggleFavorite(e, encodedUrl) {
      e.stopPropagation();
      const url = decodeURIComponent(encodedUrl);
      if (favorites.includes(url)) {
        favorites = favorites.filter(favUrl => favUrl !== url);
      } else {
        favorites.push(url);
      }
      localStorage.setItem('tv_favorites', JSON.stringify(favorites));
      filterChannels();
    }

    function addToHistory(channel) {
      historyList = historyList.filter(url => url !== channel.url);
      historyList.unshift(channel.url);
      if (historyList.length > 50) historyList.pop();
      localStorage.setItem('tv_history', JSON.stringify(historyList));
      if (selectedCategory === 'History') filterChannels();
    }

    function playStream(channel) {
      addToHistory(channel);
      document.getElementById('player-title').innerText = channel.name;
      document.getElementById('player-sub').innerText = channel.group;
      document.getElementById('mini-title').innerText = channel.name;
      document.getElementById('mini-sub').innerText = channel.group;

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.loadSource(channel.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
          setupQualityLevels(data.levels);
          video.play().then(() => playBtn.innerText = '⏸').catch(() => playBtn.innerText = '▶');
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = channel.url;
        video.play().then(() => playBtn.innerText = '⏸').catch(() => playBtn.innerText = '▶');
      }
    }

    function focusSearch() {
      const searchInput = document.getElementById('search-input');
      searchInput.focus();
      searchInput.select();
    }

    function setupQualityLevels(levels) {
      if (!levels || levels.length <= 1) return;
      qualitySelect.innerHTML = '<option value="-1">Auto ▾</option>';
      levels.forEach((level, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.innerText = level.height ? `${level.height}p` : `${Math.round(level.bitrate / 1000)}k`;
        qualitySelect.appendChild(opt);
      });
    }

    function changeQuality(levelIndex) {
      if (hls) hls.currentLevel = parseInt(levelIndex);
    }

    function togglePlay() {
      if (video.paused) {
        video.play();
        playBtn.innerText = '⏸';
        resetIdleTimer();
      } else {
        video.pause();
        playBtn.innerText = '▶';
        showControls();
      }
    }

    function toggleMute() {
      video.muted = !video.muted;
      muteBtn.innerText = video.muted ? '🔇' : '🔊';
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        playerWrapper.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    function resetIdleTimer() {
      showControls();
      clearTimeout(idleTimer);
      if (!video.paused) {
        idleTimer = setTimeout(() => playerWrapper.classList.add('user-idle'), 5000);
      }
    }

    function showControls() {
      clearTimeout(idleTimer);
      playerWrapper.classList.remove('user-idle');
    }

    playerWrapper.addEventListener('mousemove', resetIdleTimer);
    playerWrapper.addEventListener('click', resetIdleTimer);
    playerWrapper.addEventListener('mouseleave', () => {
      if (!video.paused) {
        idleTimer = setTimeout(() => playerWrapper.classList.add('user-idle'), 1000);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT') return;
      if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
      else if (e.code === 'ArrowUp') {
        e.preventDefault();
        video.volume = Math.min(1, video.volume + 0.1);
        video.muted = false;
        muteBtn.innerText = '🔊';
        resetIdleTimer();
      } else if (e.code === 'ArrowDown') {
        e.preventDefault();
        video.volume = Math.max(0, video.volume - 0.1);
        if (video.volume === 0) { video.muted = true; muteBtn.innerText = '🔇'; }
        resetIdleTimer();
      }
    });
  </script>
</body>
</html>
